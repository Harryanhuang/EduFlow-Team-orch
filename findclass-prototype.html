<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FindClass 2.0 Prototype</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #e7eaf1;
      --brand: #f6c847;
      --brand-strong: #e9a900;
      --action: #276ef1;
      --good: #1a9c72;
      --warm: #f47b3f;
      --soft-blue: #eaf2ff;
      --soft-green: #eaf8f2;
      --soft-yellow: #fff7da;
      --shadow: 0 18px 50px rgba(25, 35, 60, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #dde3ee;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .phone {
      width: min(100vw, 430px);
      height: min(100vh, 920px);
      background: var(--bg);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow);
    }

    .screen {
      height: 100%;
      overflow-y: auto;
      padding: 18px 16px 92px;
      scroll-behavior: smooth;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--brand);
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #172033;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .search input {
      border: 0;
      outline: 0;
      flex: 1;
      min-width: 0;
      color: var(--ink);
      background: transparent;
    }

    .hero {
      min-height: 172px;
      border-radius: 8px;
      background:
        linear-gradient(115deg, rgba(246, 200, 71, .92), rgba(255,255,255,.74)),
        url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1000&q=80") center / cover;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .hero h2 {
      width: 70%;
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero p {
      width: 78%;
      margin: 0 0 14px;
      color: #344054;
      font-size: 13px;
      line-height: 1.45;
    }

    .poster-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 8px;
      margin-bottom: 14px;
    }

    .poster {
      position: relative;
      flex: 0 0 86%;
      min-height: 180px;
      border-radius: 8px;
      overflow: hidden;
      text-align: left;
      color: #fff;
      background: #243047;
      scroll-snap-align: start;
    }

    .poster img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(12, 18, 32, .08), rgba(12, 18, 32, .74));
    }

    .poster-copy {
      position: absolute;
      z-index: 1;
      left: 16px;
      right: 16px;
      bottom: 15px;
    }

    .poster-copy h2 {
      margin: 8px 0 6px;
      font-size: 23px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .poster-copy p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, .86);
    }

    .primary {
      width: fit-content;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-weight: 700;
    }

    .section {
      margin-top: 18px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 12px;
    }

    .section h3 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .link-btn {
      background: transparent;
      color: var(--action);
      font-weight: 700;
      padding: 6px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .tile,
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .tile {
      min-height: 90px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
    }

    .tile strong {
      font-size: 16px;
    }

    .tile span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .card {
      padding: 14px;
      margin-bottom: 10px;
    }

    .teacher {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 12px;
      align-items: start;
    }

    .avatar {
      width: 74px;
      height: 88px;
      border-radius: 8px;
      object-fit: cover;
      background: #eef1f5;
    }

    .teacher h4,
    .resource h4,
    .activity h4 {
      margin: 0 0 6px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .meta,
    .teacher p,
    .activity p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .teacher-hero {
      padding: 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, #fff7da, #eaf2ff);
      border: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .teacher-hero h3 {
      margin: 0 0 7px;
      font-size: 20px;
      letter-spacing: 0;
    }

    .teacher-hero p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .teacher-score {
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .teacher-facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin: 8px 0;
      font-size: 12px;
      line-height: 1.4;
    }

    .teacher-facts div {
      padding: 8px;
      border-radius: 8px;
      background: #f7f9fc;
    }

    .teacher-facts span {
      display: block;
      margin-bottom: 2px;
      color: var(--muted);
      font-size: 11px;
    }

    .detail-hero {
      position: relative;
      padding: 16px;
      background: linear-gradient(135deg, #fff7da, #f7f9fc);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .detail-hero .teacher {
      border: 0;
      padding: 0;
      margin: 0;
    }

    .detail-lines {
      display: grid;
      gap: 5px;
      font-size: 12px;
      line-height: 1.4;
    }

    .detail-name {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .detail-score {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 5px 8px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(23, 32, 51, .08);
    }

    .detail-fav {
      position: absolute;
      right: 19px;
      bottom: 76px;
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #fff;
      color: #ef6a7a;
      font-size: 17px;
      box-shadow: 0 6px 18px rgba(23, 32, 51, .08);
    }

    .detail-lines div {
      color: var(--ink);
    }

    .detail-lines span {
      color: var(--muted);
    }

    .detail-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .detail-stats div {
      padding: 9px 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .detail-stats span {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .detail-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .detail-card h4 {
      margin: 0 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .teacher-reason {
      margin-top: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      background: var(--soft-green);
      color: #15735a;
      font-size: 12px;
      line-height: 1.45;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--soft-blue);
      color: #2456a6;
      font-size: 12px;
      white-space: nowrap;
    }

    .tag.green {
      background: var(--soft-green);
      color: #15735a;
    }

    .tag.yellow {
      background: var(--soft-yellow);
      color: #8a5b00;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 8px;
    }

    .tab {
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid var(--line);
      color: var(--muted);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .tab.active {
      background: var(--brand);
      color: var(--ink);
      border-color: var(--brand);
      font-weight: 800;
    }

    .teacher-filter {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .teacher-filter button,
    .teacher-filter select {
      width: 100%;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .teacher-filter .active {
      background: var(--brand);
      border-color: var(--brand);
      color: var(--ink);
    }

    .resource-list {
      display: grid;
      gap: 10px;
    }

    .resource {
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .resource-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 42px;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    .outline {
      min-height: 38px;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-weight: 900;
    }

    .downloaded {
      color: var(--good);
      font-size: 12px;
      margin-top: 8px;
    }

    .masonry {
      columns: 2;
      column-gap: 10px;
      margin-top: 4px;
    }

    .activity-note {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .activity-module-title {
      margin: 12px 0 8px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .activity-hot {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }

    .activity-hot-card {
      flex: 0 0 64%;
      min-height: 78px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      text-align: left;
    }

    .activity-hot-card h4 {
      margin: 6px 0 4px;
      font-size: 14px;
      line-height: 1.25;
    }

    .activity-filter {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 10px;
    }

    .activity-filter .tab {
      min-height: 32px;
      min-width: 0;
      padding: 0 6px;
      font-size: 12px;
      white-space: normal;
      line-height: 1.15;
    }

    .activity-card {
      width: 100%;
      display: inline-block;
      break-inside: avoid;
      margin: 0 0 10px;
      padding: 0;
      overflow: hidden;
      text-align: left;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .activity-card img {
      display: block;
      width: 100%;
      height: var(--image-height, 150px);
      object-fit: cover;
      background: #eef1f5;
    }

    .activity-body {
      padding: 10px;
    }

    .activity-body h4 {
      margin: 0 0 7px;
      font-size: 14px;
      line-height: 1.32;
      letter-spacing: 0;
    }

    .activity-body p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .activity-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .activity-type {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      max-width: 100%;
      padding: 0 7px;
      border-radius: 999px;
      background: var(--soft-yellow);
      color: #8a5b00;
      font-size: 11px;
      white-space: nowrap;
    }

    .activity-type.class {
      background: var(--soft-blue);
      color: #2456a6;
    }

    .activity-type.background {
      background: var(--soft-green);
      color: #15735a;
    }

    .activity-type.competition {
      background: #efe7ff;
      color: #6041a6;
    }

    .activity-type.open {
      background: var(--soft-yellow);
      color: #8a5b00;
    }

    .activity-cover {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
      background: #243047;
    }

    .activity-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .activity-cover .activity-type {
      position: absolute;
      left: 12px;
      bottom: 12px;
    }

    .attachment-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    .attachment-row:last-child {
      border-bottom: 0;
    }

    .mark-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .mark {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #f7f9fc;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .nav-item {
      background: transparent;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 0;
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid currentColor;
      display: block;
    }

    .nav-item.active {
      color: var(--brand-strong);
      font-weight: 800;
    }

    .page-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .page-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .back {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--line);
      font-size: 22px;
      line-height: 1;
    }

    .profile-card {
      padding: 18px;
      background: linear-gradient(120deg, var(--brand), #fff0b6);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .profile-card h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .profile-card p {
      margin: 0;
      color: #5c4a12;
      font-size: 13px;
    }

    .profile-head {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
    }

    .profile-avatar {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #8a5b00;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .profile-stats div {
      padding: 10px 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .62);
      text-align: center;
      font-weight: 900;
    }

    .profile-stats span {
      display: block;
      margin-top: 2px;
      color: #5c4a12;
      font-size: 10px;
      font-weight: 600;
    }

    .kv {
      display: grid;
      gap: 10px;
    }

    .kv div {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .kv span {
      color: var(--muted);
    }

    .modal {
      position: absolute;
      inset: 0;
      background: rgba(23, 32, 51, .42);
      display: none;
      align-items: flex-end;
      z-index: 10;
    }

    .modal.open {
      display: flex;
    }

    .sheet {
      width: 100%;
      background: var(--panel);
      border-radius: 8px 8px 0 0;
      padding: 18px 16px 22px;
      box-shadow: 0 -16px 40px rgba(23, 32, 51, .18);
    }

    .sheet h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .sheet p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .full {
      width: 100%;
      min-height: 44px;
      border-radius: 8px;
      background: var(--good);
      color: #fff;
      font-weight: 800;
      margin-top: 8px;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 72px 1fr 1.25fr;
      gap: 8px;
      margin-top: 8px;
    }

    .detail-actions button {
      min-height: 44px;
      border-radius: 8px;
      font-weight: 800;
    }

    .detail-actions .save {
      background: #fff;
      border: 1px solid var(--line);
      color: #ef6a7a;
    }

    .detail-actions .consult {
      background: var(--soft-green);
      color: #15735a;
    }

    .detail-actions .book {
      background: var(--good);
      color: #fff;
    }

    .ghost {
      width: 100%;
      min-height: 42px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      margin-top: 8px;
    }

    .success {
      border-left: 4px solid var(--good);
      background: var(--soft-green);
    }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .map-card {
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .map-card h4 {
      margin: 0 0 8px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .map-card ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

          <button class="save">♡ 收藏</button>
          <button class="consult" onclick="showConsultSheet('${t.id}')">咨询</button>
          <button class="book" onclick="showConsultSheet('${t.id}')">立即预约</button>
        </div>
      `;
    }

    function renderSuccess() {
      const recommended = teachers.filter(t => t.tags.some(tag => state.subject.includes("Math") ? tag.includes("数学") || tag === "IGCSE" : true)).slice(0, 2);
      screen.innerHTML = `
        <div class="page-title"><h2>领取成功</h2><button class="link-btn" onclick="setPage('resources')">返回资料库</button></div>
        <section class="card success">
          <h4>${state.pendingDownload ? state.pendingDownload.title : "资料"} 已保存</h4>
          ${state.pendingDownload ? `<p class="meta">${state.pendingDownload.meta}</p>` : ""}
          <p class="meta">系统已记录你的课程体系、学科和资料类型，用于后续推荐更合适的老师与活动。</p>
        </section>
        <section class="section">
          <div class="section-head"><h3>相关导师</h3><span class="meta">按下载标签推荐</span></div>
          ${recommended.map(t => teacherCard(t)).join("")}
        </section>
      `;
    }

    function selectSystem(system) {
      state.system = system;
      state.examBoard = (examBoards[system] || ["无考试局"])[0];
      state.subject = subjects[system][0];
      state.paper = papers[0];
      render();
    }

    function selectExamBoard(board) {
      state.examBoard = board;
      render();
    }

    function selectSubject(subject) {
      state.subject = subject;
      render();
    }

    function selectPaper(paper) {
      state.paper = paper;
      render();
    }

    function selectResourceYear(year) {
      state.resourceYear = year;
      render();
    }

    function selectResourceSeason(season) {
      state.resourceSeason = season;
      render();
    }

    function resetResource() {
      state.system = "IGCSE";
      state.examBoard = "CAIE";
      state.subject = "Mathematics (0580)";
      state.paper = "Paper1 (Core)";
      state.resourceYear = "全部年份";
      state.resourceSeason = "全部季节";
      render();
    }

    function downloadResource(id, type) {
      const r = resources.find(x => x.id === id);
      state.pendingDownload = {
        ...r,
        type,
        meta: `${state.system} / ${state.examBoard} / ${state.subject} / ${state.paper} / ${r.year} ${r.season} / ${type}`
      };
      if (!state.phoneVerified) {
        showPhoneSheet();
        return;
      }
      saveDownload();
    }

    function saveDownload() {
      if (state.pendingDownload && !state.downloads.some(d => d.title === state.pendingDownload.title && d.type === state.pendingDownload.type)) {
        state.downloads.unshift(state.pendingDownload);
      }
      closeModal();
      state.page = "success";
      render();
    }

    function showPhoneSheet() {
      modal.className = "modal open";
      modal.innerHTML = `
        <section class="sheet">
          <h3>领取完整资料</h3>
          <p>授权微信手机号后，可下载试卷和答案，并在“我的资料”中继续查看。</p>
          <button class="full" onclick="authorizePhone()">授权手机号并领取</button>
          <button class="ghost" onclick="closeModal()">暂不领取</button>
        </section>
      `;
    }

    function copyActivityLink(label) {
      if (!state.phoneVerified) {
        modal.className = "modal open";
        modal.innerHTML = `
          <section class="sheet">
            <h3>登录后复制链接</h3>
            <p>授权手机号后，可复制活动网盘、报名表等外部链接。</p>
            <button class="full" onclick="authorizeLinkCopy('${label}')">授权手机号并复制</button>
            <button class="ghost" onclick="closeModal()">暂不复制</button>
          </section>
        `;
        return;
      }
      showCopiedSheet(label);
    }

    function authorizeLinkCopy(label) {
      state.phoneVerified = true;
      showCopiedSheet(label);
    }

    function showCopiedSheet(label) {
      modal.className = "modal open";
      modal.innerHTML = `
        <section class="sheet">
          <h3>链接已复制</h3>
          <p>${label} 已复制到剪贴板。原型里先用提示模拟复制动作。</p>
          <button class="full" onclick="closeModal()">知道了</button>
        </section>
      `;
    }

    function showLeadSheet() {
      modal.className = "modal open";
      modal.innerHTML = `
        <section class="sheet">
          <h3>60 秒匹配</h3>
          <p>当前原型先用资料下载行为生成推荐。正式版可加入年级、目标分和预算。</p>
          <button class="full" onclick="setPageFromModal('resources')">先去领取资料</button>
          <button class="ghost" onclick="closeModal()">关闭</button>
        </section>
      `;
    }

    function showConsultSheet(id) {
      const t = teachers.find(x => x.id === id);
      modal.className = "modal open";
      modal.innerHTML = `
        <section class="sheet">
          <h3>预约 ${t.name}</h3>
          <p>原型里不提交订单。正式版这里进入咨询单，记录老师、学科和资料来源。</p>
          <button class="full" onclick="closeModal()">知道了</button>
        </section>
      `;
    }

    function authorizePhone() {
      state.phoneVerified = true;
      saveDownload();
    }

    function setPageFromModal(page) {
      closeModal();
      setPage(page);
    }

    function closeModal() {
      modal.className = "modal";
      modal.innerHTML = "";
    }

    function openTeacher(id) {
      state.selectedTeacher = id;
      state.page = "teacherDetail";
      render();
    }

    function openActivity(id) {
      state.selectedActivity = id;
      state.page = "activityDetail";
      render();
    }

    function openTeacherFromModal(id) {
      closeModal();
      openTeacher(id);
    }

    function render() {
      renderNav();
      if (state.page === "home") renderHome();
      else if (state.page === "resources") renderResources();
      else if (state.page === "teachers") renderTeachers();
      else if (state.page === "activities") renderActivities();
      else if (state.page === "me") renderMe();
      else if (state.page === "success") renderSuccess();
      else if (state.page === "teacherDetail") renderTeacherDetail();
      else if (state.page === "activityDetail") renderActivityDetail();
      else if (state.page === "map") renderProductMap();
      screen.scrollTop = 0;
    }

    render();
  </script>
</body>
</html>
