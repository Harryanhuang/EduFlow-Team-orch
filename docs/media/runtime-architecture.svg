<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">EduFlow Runtime Architecture</title>
  <desc id="desc">Architecture diagram showing chat, router, manager, worker pool, local store, memory, workflow registry, and watchdog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf6ff"/>
    </linearGradient>
    <style>
      .title{font:800 62px Inter,Arial,sans-serif;letter-spacing:0;fill:#0f172a}
      .box-title{font:800 25px Inter,Arial,sans-serif;fill:#0f172a}
      .label{font:650 19px Inter,Arial,sans-serif;fill:#1e293b}
      .small{font:500 16px Inter,Arial,sans-serif;fill:#475569}
      .box{stroke-width:3}
      .flow{stroke:#0f172a;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .feed{stroke:#16a34a;stroke-width:3;stroke-dasharray:8 10;fill:none;marker-end:url(#arrowGreen)}
      .monitor{stroke:#dc2626;stroke-width:3;stroke-dasharray:8 10;fill:none;marker-end:url(#arrowRed)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="390" y="88" class="title">EduFlow Runtime Architecture</text>

  <g transform="translate(60 150)">
    <rect class="box" width="205" height="220" rx="20" fill="#dbeafe" stroke="#2563eb"/>
    <circle cx="103" cy="78" r="38" fill="#3b82f6"/>
    <circle cx="87" cy="78" r="6" fill="#fff"/>
    <circle cx="103" cy="78" r="6" fill="#fff"/>
    <circle cx="119" cy="78" r="6" fill="#fff"/>
    <text x="52" y="150" class="box-title">User</text>
    <text x="38" y="182" class="label">Feishu Chat</text>
  </g>

  <g transform="translate(360 150)">
    <rect class="box" width="220" height="220" rx="20" fill="#ede9fe" stroke="#7c3aed"/>
    <path d="M80 84 H142 M110 52 V116 M142 84 L168 58 M142 84 L168 110" stroke="#7c3aed" stroke-width="12" stroke-linecap="round" fill="none"/>
    <text x="40" y="150" class="box-title">Feishu Router</text>
    <text x="50" y="182" class="small">events + cards</text>
  </g>

  <g transform="translate(690 150)">
    <rect class="box" width="230" height="220" rx="20" fill="#dcfce7" stroke="#16a34a"/>
    <rect x="72" y="72" width="86" height="58" rx="24" fill="#22c55e"/>
    <circle cx="98" cy="101" r="7" fill="#052e16"/>
    <circle cx="132" cy="101" r="7" fill="#052e16"/>
    <path d="M115 72 V47" stroke="#16a34a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="115" cy="42" r="9" fill="#16a34a"/>
    <text x="28" y="166" class="box-title">Manager Agent</text>
    <text x="50" y="198" class="small">dispatch owner</text>
  </g>

  <g transform="translate(1030 130)">
    <rect class="box" width="510" height="260" rx="22" fill="#eff6ff" stroke="#2563eb"/>
    <text x="128" y="48" class="box-title">Worker Agent Pool</text>
    <text x="174" y="78" class="small">isolated tmux panes</text>
    <g transform="translate(34 104)">
      <rect width="118" height="116" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <text x="36" y="48" class="box-title">W1</text>
      <rect x="18" y="70" width="82" height="30" rx="6" fill="#0f172a"/>
    </g>
    <g transform="translate(182 104)">
      <rect width="118" height="116" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <text x="36" y="48" class="box-title">W2</text>
      <rect x="18" y="70" width="82" height="30" rx="6" fill="#0f172a"/>
    </g>
    <text x="326" y="168" class="box-title">...</text>
    <g transform="translate(374 104)">
      <rect width="118" height="116" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
      <text x="34" y="48" class="box-title">WN</text>
      <rect x="18" y="70" width="82" height="30" rx="6" fill="#0f172a"/>
    </g>
  </g>

  <path class="flow" d="M265 260 H358"/>
  <path class="flow" d="M580 260 H688"/>
  <path class="flow" d="M920 260 H1028"/>

  <g transform="translate(450 505)">
    <rect class="box" width="250" height="152" rx="20" fill="#fef3c7" stroke="#d97706"/>
    <text x="38" y="58" class="box-title">Memory Layer</text>
    <text x="48" y="92" class="small">constraints</text>
    <text x="48" y="120" class="small">packets + recall</text>
  </g>

  <g transform="translate(748 505)">
    <rect class="box" width="272" height="152" rx="20" fill="#ecfeff" stroke="#0891b2"/>
    <text x="32" y="58" class="box-title">Workflow Registry</text>
    <text x="50" y="92" class="small">roles + gates</text>
    <text x="50" y="120" class="small">templates + closeout</text>
  </g>

  <g transform="translate(1080 500)">
    <rect class="box" width="430" height="172" rx="20" fill="#f8fafc" stroke="#2563eb"/>
    <text x="146" y="44" class="box-title">Local Store</text>
    <rect x="34" y="76" width="80" height="58" rx="10" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="54" y="113" class="small">inbox</text>
    <rect x="126" y="76" width="80" height="58" rx="10" fill="#dcfce7" stroke="#22c55e"/>
    <text x="142" y="113" class="small">status</text>
    <rect x="218" y="76" width="80" height="58" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="242" y="113" class="small">logs</text>
    <rect x="310" y="76" width="80" height="58" rx="10" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="330" y="113" class="small">tasks</text>
  </g>

  <path class="feed" d="M575 505 V426 C575 396 650 390 746 370"/>
  <path class="feed" d="M884 505 V420 C884 398 862 392 834 372"/>
  <path class="feed" d="M1020 581 H1080"/>
  <path class="feed" d="M1280 500 V390"/>

  <g transform="translate(490 760)">
    <rect class="box" width="590" height="86" rx="20" fill="#fff1f2" stroke="#ef4444"/>
    <text x="168" y="36" class="box-title">Watchdog / Runtime Guard</text>
    <text x="174" y="64" class="small">monitors router, panes, credentials, and stale events</text>
  </g>
  <path class="monitor" d="M530 760 C390 700 392 520 470 372"/>
  <path class="monitor" d="M920 760 C1170 704 1275 572 1280 390"/>
</svg>
