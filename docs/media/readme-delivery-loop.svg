<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">EduFlow delivery loop</title>
  <desc id="desc">A six-stage loop from intake to crystallization.</desc>
  <defs>
    <style>
      .title { font: 800 44px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fbf8; }
      .stage { font: 800 26px Inter, ui-sans-serif, system-ui, sans-serif; fill: #16312d; }
      .text { font: 500 19px Inter, ui-sans-serif, system-ui, sans-serif; fill: #49605b; }
      .num { font: 900 34px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f8fbf8; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1600" height="760" fill="#14252b"/>
  <text x="90" y="90" class="title">Delivery loop</text>

  <g transform="translate(118,168)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#2c6e63"/>
    <text x="38" y="60" class="num">1</text>
    <text x="92" y="48" class="stage">Intake</text>
    <text x="92" y="84" class="text">manager receives goal</text>
  </g>
  <g transform="translate(620,168)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#526f9f"/>
    <text x="38" y="60" class="num">2</text>
    <text x="92" y="48" class="stage">Dispatch</text>
    <text x="92" y="84" class="text">scope, owner, gate</text>
  </g>
  <g transform="translate(1122,168)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#8661a4"/>
    <text x="38" y="60" class="num">3</text>
    <text x="92" y="48" class="stage">Execute</text>
    <text x="92" y="84" class="text">worker creates artifacts</text>
  </g>
  <g transform="translate(1122,460)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#2f7a55"/>
    <text x="38" y="60" class="num">4</text>
    <text x="92" y="48" class="stage">Review</text>
    <text x="92" y="84" class="text">verdict and evidence</text>
  </g>
  <g transform="translate(620,460)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#b87333"/>
    <text x="38" y="60" class="num">5</text>
    <text x="92" y="48" class="stage">Closeout</text>
    <text x="92" y="84" class="text">manager summarizes result</text>
  </g>
  <g transform="translate(118,460)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="132" rx="22" fill="#f7fbf8"/>
    <circle cx="48" cy="48" r="28" fill="#57706b"/>
    <text x="38" y="60" class="num">6</text>
    <text x="92" y="48" class="stage">Crystallize</text>
    <text x="92" y="84" class="text">workflow, memory, skill</text>
  </g>

  <path d="M486 234 H606" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>
  <path d="M988 234 H1108" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>
  <path d="M1302 312 V446" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>
  <path d="M1108 526 H988" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>
  <path d="M606 526 H486" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>
  <path d="M298 446 V312" stroke="#f2cb7d" stroke-width="7" stroke-linecap="round"/>

  <text x="90" y="692" class="text" fill="#d9e8e0">The loop is operational, not decorative: every stage leaves a recoverable trace in facts, tasks, workflows, or memory.</text>
</svg>
