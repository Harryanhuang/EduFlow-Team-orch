<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">EduFlow Team Orch</title>
  <desc id="desc">Hero illustration for a local multi-agent orchestration system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".55" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .title{font:800 86px Inter,Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .subtitle{font:400 28px Inter,Arial,sans-serif;fill:#b6c4d6}
      .label{font:800 26px Inter,Arial,sans-serif;fill:#eef8ff}
      .small{font:500 18px Inter,Arial,sans-serif;fill:#a7b7ca}
      .mono{font:600 16px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#9bf6d0}
      .panel{fill:#0f1c2d;stroke:#2f4968;stroke-width:2}
      .terminal{fill:#08111f;stroke:#355474;stroke-width:2}
      .line{fill:none;stroke:#2dd4bf;stroke-width:4;opacity:.78}
      .dash{fill:none;stroke:#64748b;stroke-width:2;stroke-dasharray:8 12;opacity:.8}
    </style>
  </defs>
  <rect width="1600" height="900" rx="34" fill="url(#bg)"/>
  <circle cx="805" cy="462" r="305" fill="#0f766e" opacity=".08"/>
  <circle cx="805" cy="462" r="220" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="8 14" opacity=".38"/>
  <circle cx="805" cy="462" r="315" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="10 18" opacity=".24"/>

  <text x="410" y="112" class="title">EduFlow <tspan fill="url(#accent)">Team Orch</tspan></text>
  <text x="470" y="162" class="subtitle">Local AI teams · tmux runtime · Feishu control · audit trail</text>

  <g transform="translate(52 96)">
    <rect class="terminal" width="326" height="158" rx="16"/>
    <text x="24" y="42" class="mono">manager</text>
    <circle cx="282" cy="34" r="7" fill="#22c55e"/>
    <text x="30" y="84" class="mono">&gt; read workflow registry</text>
    <text x="30" y="114" class="mono">&gt; dispatch workers</text>
    <text x="30" y="144" class="mono">&gt; collect evidence</text>
  </g>
  <g transform="translate(52 298)">
    <rect class="terminal" width="326" height="148" rx="16"/>
    <text x="24" y="42" class="mono" fill="#93c5fd">worker_codex</text>
    <circle cx="282" cy="34" r="7" fill="#60a5fa"/>
    <text x="30" y="86" class="mono">&gt; edit files</text>
    <text x="30" y="116" class="mono">&gt; run checks</text>
  </g>
  <g transform="translate(52 490)">
    <rect class="terminal" width="326" height="148" rx="16"/>
    <text x="24" y="42" class="mono" fill="#fde68a">review_gate</text>
    <circle cx="282" cy="34" r="7" fill="#f59e0b"/>
    <text x="30" y="86" class="mono">&gt; verify manifest</text>
    <text x="30" y="116" class="mono">&gt; record verdict</text>
  </g>

  <g transform="translate(695 350)">
    <circle cx="110" cy="110" r="110" fill="#10263b" stroke="#2dd4bf" stroke-width="5"/>
    <rect x="62" y="78" width="96" height="66" rx="28" fill="#8ef4e9"/>
    <circle cx="91" cy="111" r="7" fill="#0f172a"/>
    <circle cx="129" cy="111" r="7" fill="#0f172a"/>
    <path d="M110 78 V45" stroke="#2dd4bf" stroke-width="8" stroke-linecap="round"/>
    <circle cx="110" cy="39" r="10" fill="#2dd4bf"/>
    <text x="16" y="260" class="label">Manager Agent</text>
    <text x="22" y="292" class="small">the only dispatch owner</text>
  </g>

  <g transform="translate(565 248)">
    <circle r="66" fill="#11264a" stroke="#60a5fa" stroke-width="3"/>
    <text x="-45" y="8" class="label">Plan</text>
  </g>
  <g transform="translate(1038 248)">
    <circle r="66" fill="#251a3d" stroke="#a78bfa" stroke-width="3"/>
    <text x="-50" y="8" class="label">Write</text>
  </g>
  <g transform="translate(565 664)">
    <circle r="66" fill="#2b220f" stroke="#f59e0b" stroke-width="3"/>
    <text x="-54" y="8" class="label">Review</text>
  </g>
  <g transform="translate(1038 664)">
    <circle r="66" fill="#10291f" stroke="#34d399" stroke-width="3"/>
    <text x="-38" y="8" class="label">Ops</text>
  </g>
  <path class="dash" d="M615 270 C700 330 724 370 760 406"/>
  <path class="dash" d="M986 270 C910 330 888 370 852 406"/>
  <path class="dash" d="M616 642 C690 588 720 548 758 518"/>
  <path class="dash" d="M986 642 C912 588 888 548 852 518"/>
  <path class="line" d="M378 368 C506 368 568 462 690 462"/>
  <path class="line" d="M378 562 C520 562 568 462 690 462"/>

  <g transform="translate(1180 126)">
    <rect width="320" height="620" rx="46" fill="#070d18" stroke="#3c4c63" stroke-width="5"/>
    <rect x="26" y="64" width="268" height="500" rx="28" fill="#111827"/>
    <text x="58" y="110" class="small" fill="#e5e7eb">Team Chat</text>
    <rect x="76" y="144" width="182" height="76" rx="18" fill="#2563eb"/>
    <text x="96" y="177" class="small" fill="#f8fafc">Run AP workflow.</text>
    <text x="96" y="202" class="small" fill="#f8fafc">Need closeout.</text>
    <rect x="48" y="248" width="220" height="84" rx="16" fill="#172136" stroke="#273750"/>
    <text x="66" y="280" class="small" fill="#7dd3fc">manager</text>
    <text x="66" y="306" class="small" fill="#dbeafe">Dispatching workers.</text>
    <rect x="48" y="362" width="220" height="88" rx="16" fill="#172136" stroke="#273750"/>
    <text x="66" y="394" class="small" fill="#86efac">worker</text>
    <text x="66" y="420" class="small" fill="#dbeafe">Evidence attached.</text>
    <rect x="48" y="480" width="220" height="58" rx="16" fill="#172136" stroke="#273750"/>
    <text x="66" y="516" class="small" fill="#fde68a">Gate passed.</text>
  </g>
  <path class="line" d="M912 462 C1032 462 1066 438 1180 438"/>

  <g transform="translate(74 702)">
    <rect class="panel" width="408" height="116" rx="18"/>
    <text x="28" y="45" class="label" fill="#86efac">Local audit trail</text>
    <text x="28" y="78" class="small">inbox / status / logs / tasks / memory</text>
  </g>
  <g transform="translate(610 736)">
    <rect class="panel" width="484" height="82" rx="18"/>
    <text x="28" y="52" class="label">Workflow-guided delivery</text>
  </g>
</svg>
