<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">EduFlow runtime map</title>
  <desc id="desc">A layered map of user interfaces, orchestration commands, tmux agents, local stores, and runtime supervisors.</desc>
  <defs>
    <style>
      .title { font: 800 44px Inter, ui-sans-serif, system-ui, sans-serif; fill: #15302d; }
      .layer { font: 800 24px Inter, ui-sans-serif, system-ui, sans-serif; fill: #17312d; }
      .text { font: 500 20px Inter, ui-sans-serif, system-ui, sans-serif; fill: #405b55; }
      .mono { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #2d514b; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#16312d" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1600" height="860" fill="#f6faf7"/>
  <text x="90" y="86" class="title">Runtime map</text>
  <text x="90" y="123" class="text">Everything important stays visible: commands, panes, facts, tasks, workflows, and recovery evidence.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="170" width="1420" height="112" rx="20" fill="#e6f1ed"/>
    <text x="124" y="215" class="layer">Operator surfaces</text>
    <text x="124" y="252" class="text">Feishu/Lark group, local shell, tmux attach, README playbooks</text>

    <rect x="90" y="320" width="1420" height="112" rx="20" fill="#eef0fa"/>
    <text x="124" y="365" class="layer">Command surface</text>
    <text x="124" y="402" class="mono">send · inbox · read · say · team · task · workflow · health · runtime</text>

    <rect x="90" y="470" width="1420" height="150" rx="20" fill="#fff5e8"/>
    <text x="124" y="516" class="layer">Agent runtime</text>
    <text x="124" y="553" class="text">manager, auto_ops, recorder, course, review, qbank, builder, syllabus, Hermes</text>
    <text x="124" y="586" class="text">tmux panes with resident/warm lifecycle, reidentify, smoke checks, provider failover</text>

    <rect x="90" y="658" width="682" height="118" rx="20" fill="#e9f7ef"/>
    <text x="124" y="703" class="layer">Local truth</text>
    <text x="124" y="740" class="text">facts, inbox, status, logs, tasks, runtime events, memory</text>

    <rect x="828" y="658" width="682" height="118" rx="20" fill="#f3ebf8"/>
    <text x="862" y="703" class="layer">Reusable operations</text>
    <text x="862" y="740" class="text">workflow registry, gates, templates, scenarios, closeout evidence</text>
  </g>

  <path d="M800 282 V320" stroke="#38645d" stroke-width="5" stroke-linecap="round"/>
  <path d="M800 432 V470" stroke="#38645d" stroke-width="5" stroke-linecap="round"/>
  <path d="M800 620 V650" stroke="#38645d" stroke-width="5" stroke-linecap="round"/>
  <path d="M430 620 V650" stroke="#38645d" stroke-width="5" stroke-linecap="round"/>
  <path d="M1170 620 V650" stroke="#38645d" stroke-width="5" stroke-linecap="round"/>
</svg>
