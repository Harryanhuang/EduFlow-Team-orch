<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Education production panel</title>
  <desc id="desc">A feature diagram showing course, syllabus, qbank, review, and knowledge work moving through evidence and quality gates.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbf8"/>
      <stop offset="1" stop-color="#fff6ec"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#273540" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="760" height="420" rx="28" fill="url(#bg)"/>
  <rect x="34" y="34" width="692" height="352" rx="24" fill="#ffffff" stroke="#e3e1d4" filter="url(#shadow)"/>
  <text x="62" y="80" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#25313a">Education Production</text>
  <text x="62" y="108" font-family="Inter, Arial, sans-serif" font-size="14" fill="#657178">bounded roles, evidence files, verdicts, reusable gates</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="72" y="148" width="120" height="78" rx="16" fill="#eaf3ff" stroke="#9fc5e8"/>
    <text x="132" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#214a6b">course</text>
    <text x="132" y="199" text-anchor="middle" font-size="12" fill="#54718a">topic assets</text>

    <rect x="232" y="148" width="120" height="78" rx="16" fill="#eef8f0" stroke="#aad3af"/>
    <text x="292" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#2b5635">syllabus</text>
    <text x="292" y="199" text-anchor="middle" font-size="12" fill="#55755c">alignment</text>

    <rect x="392" y="148" width="120" height="78" rx="16" fill="#fff3df" stroke="#e9c37a"/>
    <text x="452" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#694214">qbank</text>
    <text x="452" y="199" text-anchor="middle" font-size="12" fill="#7a633d">schema ready</text>

    <rect x="552" y="148" width="120" height="78" rx="16" fill="#f1efff" stroke="#c1b7ee"/>
    <text x="612" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#44346f">review</text>
    <text x="612" y="199" text-anchor="middle" font-size="12" fill="#6a5d8d">formal verdict</text>

    <path d="M192 187 H232 M352 187 H392 M512 187 H552" stroke="#9aaab1" stroke-width="3" stroke-linecap="round"/>

    <rect x="116" y="282" width="148" height="58" rx="15" fill="#263845"/>
    <text x="190" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">evidence files</text>
    <text x="190" y="326" text-anchor="middle" font-size="12" fill="#d0dbe2">manifest + QA</text>

    <rect x="306" y="282" width="148" height="58" rx="15" fill="#2d5b47"/>
    <text x="380" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">quality gate</text>
    <text x="380" y="326" text-anchor="middle" font-size="12" fill="#d3e7dd">pass or rework</text>

    <rect x="496" y="282" width="148" height="58" rx="15" fill="#604b2a"/>
    <text x="570" y="306" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">reusable asset</text>
    <text x="570" y="326" text-anchor="middle" font-size="12" fill="#eedec4">next subject faster</text>

    <path d="M264 311 H306 M454 311 H496" stroke="#b7c4c0" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
