<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">EduFlow Team Orch command center</title>
  <desc id="desc">A command center style overview showing a human operator, manager, specialist agents, local state, and runtime guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#101820"/>
      <stop offset="55%" stop-color="#13252c"/>
      <stop offset="100%" stop-color="#172b35"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0%" stop-color="#f8fbf8"/>
      <stop offset="100%" stop-color="#e7f0ea"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .small { font: 500 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #d9e8e0; }
      .tiny { font: 500 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #47615b; }
      .label { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17312d; }
      .title { font: 800 72px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fbf8; letter-spacing: 0; }
      .subtitle { font: 500 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #c6d9d1; }
      .chip { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fbf8; }
    </style>
  </defs>
  <rect width="1600" height="760" fill="url(#bg)"/>
  <path d="M0 650 C220 580 330 705 535 640 C740 575 870 705 1080 630 C1290 555 1430 630 1600 575 L1600 760 L0 760 Z" fill="#203c42" opacity="0.72"/>
  <path d="M90 120 H1510" stroke="#9bd7c5" stroke-opacity="0.16" stroke-width="2"/>
  <path d="M90 640 H1510" stroke="#9bd7c5" stroke-opacity="0.16" stroke-width="2"/>

  <text x="96" y="170" class="title">EduFlow Team Orch</text>
  <text x="101" y="222" class="subtitle">Local command center for managed AI teams, education workflows, and resilient runtime operations.</text>

  <g transform="translate(102,282)">
    <rect x="0" y="0" width="214" height="48" rx="24" fill="#2d6f63"/>
    <text x="30" y="31" class="chip">tmux runtime</text>
  </g>
  <g transform="translate(334,282)">
    <rect x="0" y="0" width="224" height="48" rx="24" fill="#486b91"/>
    <text x="28" y="31" class="chip">Feishu/Lark</text>
  </g>
  <g transform="translate(576,282)">
    <rect x="0" y="0" width="246" height="48" rx="24" fill="#7b5b92"/>
    <text x="26" y="31" class="chip">workflow gates</text>
  </g>
  <g transform="translate(840,282)">
    <rect x="0" y="0" width="228" height="48" rx="24" fill="#9b6539"/>
    <text x="30" y="31" class="chip">local evidence</text>
  </g>

  <g filter="url(#soft)">
    <rect x="110" y="398" width="255" height="168" rx="22" fill="url(#panel)"/>
    <text x="144" y="448" class="label">Operator</text>
    <text x="144" y="489" class="tiny">Feishu group</text>
    <text x="144" y="519" class="tiny">local CLI</text>
    <text x="144" y="549" class="tiny">human decisions</text>

    <rect x="455" y="364" width="290" height="236" rx="24" fill="url(#panel)"/>
    <text x="492" y="418" class="label">Manager</text>
    <text x="492" y="462" class="tiny">scope and dispatch</text>
    <text x="492" y="492" class="tiny">workflow selection</text>
    <text x="492" y="522" class="tiny">formal closeout</text>
    <text x="492" y="552" class="tiny">escalation owner</text>

    <rect x="832" y="338" width="312" height="288" rx="24" fill="url(#panel)"/>
    <text x="870" y="392" class="label">Specialists</text>
    <text x="870" y="436" class="tiny">course production</text>
    <text x="870" y="466" class="tiny">review verdicts</text>
    <text x="870" y="496" class="tiny">qbank validation</text>
    <text x="870" y="526" class="tiny">runtime repair</text>
    <text x="870" y="556" class="tiny">memory stewardship</text>

    <rect x="1236" y="386" width="264" height="190" rx="24" fill="url(#panel)"/>
    <text x="1272" y="438" class="label">Control Plane</text>
    <text x="1272" y="482" class="tiny">health + runtime verify</text>
    <text x="1272" y="512" class="tiny">inbox + task ledger</text>
    <text x="1272" y="542" class="tiny">workflow evidence</text>
  </g>

  <path d="M365 482 H455" stroke="#f2cb7d" stroke-width="5" stroke-linecap="round"/>
  <path d="M745 482 H832" stroke="#f2cb7d" stroke-width="5" stroke-linecap="round"/>
  <path d="M1144 482 H1236" stroke="#f2cb7d" stroke-width="5" stroke-linecap="round"/>
  <circle cx="410" cy="482" r="7" fill="#f2cb7d"/>
  <circle cx="790" cy="482" r="7" fill="#f2cb7d"/>
  <circle cx="1190" cy="482" r="7" fill="#f2cb7d"/>

  <text x="102" y="690" class="small">Built for real production lines: AP/IGCSE knowledge bases, QA review, qbank validation, memory, and recovery.</text>
</svg>
