<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Workflow-Guided Delivery</title>
  <desc id="desc">Pipeline diagram for request, manager dispatch, worker execution, review gate, evidence account, and closeout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061525"/>
      <stop offset=".58" stop-color="#0b2031"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <style>
      .title{font:800 66px Inter,Arial,sans-serif;letter-spacing:0;fill:#f8fafc}
      .subtitle{font:400 24px Inter,Arial,sans-serif;fill:#a7b7ca}
      .step-title{font:800 22px Inter,Arial,sans-serif;fill:#f8fafc}
      .label{font:700 21px Inter,Arial,sans-serif;fill:#dff7ff}
      .small{font:500 16px Inter,Arial,sans-serif;fill:#9fb1c6}
      .tiny{font:500 14px Inter,Arial,sans-serif;fill:#b8c7d9}
      .panel{fill:#0f1c2d;stroke:#34506f;stroke-width:2}
      .step{fill:#12243a;stroke-width:3}
      .arrow{stroke:#6b7f99;stroke-width:4;fill:none;marker-end:url(#arrow)}
      .drop{stroke-width:2;stroke-dasharray:5 8;fill:none}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#6b7f99"/>
    </marker>
  </defs>
  <rect width="1600" height="900" rx="30" fill="url(#bg)"/>
  <text x="62" y="86" class="small" fill="#2dd4bf">EduFlow Team Orch</text>
  <text x="62" y="150" class="title">Workflow-Guided Delivery</text>
  <text x="64" y="190" class="subtitle">Structured workflows, coordinated AI agents, verifiable outcomes.</text>

  <rect x="38" y="236" width="1524" height="276" rx="28" fill="#0d1828" stroke="#3a536f" stroke-width="2"/>

  <g transform="translate(70 260)">
    <rect class="step" width="200" height="214" rx="20" stroke="#3b82f6"/>
    <circle cx="32" cy="34" r="20" fill="#3b82f6"/>
    <text x="25" y="41" class="label">1</text>
    <text x="36" y="106" class="step-title">Request</text>
    <text x="30" y="146" class="tiny">Goal, scope, owner,</text>
    <text x="30" y="170" class="tiny">and success criteria.</text>
  </g>
  <path class="arrow" d="M286 367 H328"/>

  <g transform="translate(340 260)">
    <rect class="step" width="210" height="214" rx="20" stroke="#22d3ee"/>
    <circle cx="32" cy="34" r="20" fill="#0891b2"/>
    <text x="25" y="41" class="label">2</text>
    <text x="32" y="94" class="step-title">Manager</text>
    <text x="32" y="124" class="step-title">Dispatch</text>
    <text x="30" y="146" class="tiny">Break work into lanes</text>
    <text x="30" y="170" class="tiny">and assign agents.</text>
  </g>
  <path class="arrow" d="M566 367 H608"/>

  <g transform="translate(620 260)">
    <rect class="step" width="210" height="214" rx="20" stroke="#2dd4bf"/>
    <circle cx="32" cy="34" r="20" fill="#14b8a6"/>
    <text x="25" y="41" class="label">3</text>
    <text x="32" y="94" class="step-title">Worker</text>
    <text x="32" y="124" class="step-title">Execution</text>
    <text x="30" y="146" class="tiny">Produce artifacts and</text>
    <text x="30" y="170" class="tiny">record checkpoints.</text>
  </g>
  <path class="arrow" d="M846 367 H888"/>

  <g transform="translate(900 260)">
    <rect class="step" width="190" height="214" rx="20" stroke="#4ade80"/>
    <circle cx="32" cy="34" r="20" fill="#22c55e"/>
    <text x="25" y="41" class="label">4</text>
    <text x="32" y="106" class="step-title">Review Gate</text>
    <text x="30" y="146" class="tiny">Validate outputs</text>
    <text x="30" y="170" class="tiny">against criteria.</text>
  </g>
  <path class="arrow" d="M1106 367 H1148"/>

  <g transform="translate(1160 260)">
    <rect class="step" width="190" height="214" rx="20" stroke="#facc15"/>
    <circle cx="32" cy="34" r="20" fill="#ca8a04"/>
    <text x="25" y="41" class="label">5</text>
    <text x="32" y="106" class="step-title">Evidence</text>
    <text x="32" y="134" class="step-title">Account</text>
    <text x="30" y="170" class="tiny">Decisions, files,</text>
    <text x="30" y="194" class="tiny">and provenance.</text>
  </g>
  <path class="arrow" d="M1366 367 H1408"/>

  <g transform="translate(1420 260)">
    <rect class="step" width="118" height="214" rx="20" stroke="#fb923c"/>
    <circle cx="32" cy="34" r="20" fill="#f97316"/>
    <text x="25" y="41" class="label">6</text>
    <text x="18" y="104" class="step-title">Closeout</text>
    <text x="24" y="132" class="step-title">Publish</text>
  </g>

  <path class="drop" d="M170 474 V548" stroke="#3b82f6"/>
  <path class="drop" d="M445 474 V548" stroke="#22d3ee"/>
  <path class="drop" d="M725 474 V548" stroke="#2dd4bf"/>
  <path class="drop" d="M995 474 V548" stroke="#4ade80"/>
  <path class="drop" d="M1255 474 V548" stroke="#facc15"/>

  <g transform="translate(58 558)">
    <rect class="panel" width="330" height="170" rx="20" stroke="#3b82f6"/>
    <text x="34" y="50" class="label" fill="#93c5fd">Workflow Registry</text>
    <text x="34" y="84" class="small">Roles, gates, templates,</text>
    <text x="34" y="112" class="small">forbidden moves, closeout.</text>
  </g>
  <g transform="translate(425 558)">
    <rect class="panel" width="330" height="170" rx="20" stroke="#22d3ee"/>
    <text x="34" y="50" class="label" fill="#67e8f9">Task Ledger</text>
    <text x="34" y="84" class="small">Ownership, stages,</text>
    <text x="34" y="112" class="small">verdicts, next actions.</text>
  </g>
  <g transform="translate(792 558)">
    <rect class="panel" width="330" height="170" rx="20" stroke="#4ade80"/>
    <text x="34" y="50" class="label" fill="#86efac">Memory Packet</text>
    <text x="34" y="84" class="small">Context, constraints,</text>
    <text x="34" y="112" class="small">decisions, references.</text>
  </g>
  <g transform="translate(1159 558)">
    <rect class="panel" width="330" height="170" rx="20" stroke="#facc15"/>
    <text x="34" y="50" class="label" fill="#fde68a">Local Audit Trail</text>
    <text x="34" y="84" class="small">Events, messages, files,</text>
    <text x="34" y="112" class="small">and evidence links.</text>
  </g>

  <g transform="translate(58 790)">
    <rect width="1430" height="70" rx="18" fill="#0e1b2c" stroke="#2c425e"/>
    <text x="34" y="44" class="label" fill="#bfdbfe">Governed by design</text>
    <text x="330" y="44" class="label" fill="#99f6e4">Built for teams and agents</text>
    <text x="736" y="44" class="label" fill="#bbf7d0">Evidence at every step</text>
    <text x="1100" y="44" class="label" fill="#fde68a">Continuously improving</text>
  </g>
</svg>
