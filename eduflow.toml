# EduFlow Team 配置（单文件替代 team.json + runtime_config.json）
# 每个字段都可被同名 env var 覆盖：
#   EDUFLOW_<PATH>_<KEY>  例 router.stale_event_threshold_s
#                         → EDUFLOW_ROUTER_STALE_EVENT_THRESHOLD_S
# 优先级: env > 本文件 > 代码硬编码默认

# ── 部署常量（必填）─────────────────────────────────────────
chat_id      = "oc_31f0f00378bea36dd5e8f69256cc7a5e" # EduFlow Team 8-Agent Validation
lark_profile = "eduflow-team"             # 独立 EduFlow Team bot profile
default_model = "opus"                    # team.json agent 没指定 model 时回退到这里

# ── [runtime_registry]  cli + model + provider 容灾注册表 ───────
# agent 可以不用直接写 cli/model，而是绑定一个 runtime。
# 第一版先支持：
#   - 启动时解析 runtime -> cli/model/provider/env_profile
#   - spawn 失败 / ready 超时时按 fallback_to 尝试切换
# 后续再补更细的 provider health / rate limit / auth failure 切换。
#
# 当前容灾链（主）：claude_proxy_minimax_backup (MiniMax M3)
#                → claude_proxy_mimo_backup (mimo-v2.5-pro)
#                → claude_proxy_kimi_primary (Kimi K2.7 Code)
# 注：deepseek-v4-pro 容灾链已于 2026-06-22 移除（provider 持续 503）。
# 注：runtime 名中的 "_qwen_plus" / "_claude" 等是历史命名，
#     实际 provider 以 env_profile 为准（见上方容灾链）。
[runtime_registry.course_primary]
cli = "claude-code"
model = "sonnet"
provider = "anthropic-proxy"
env_profile = "claude_proxy_primary"
fallback_to = "course_backup_minimax"
switch_on = ["spawn_failed", "ready_timeout", "rate_limit", "auth_failure", "provider_unavailable", "conversation_history_corrupt"]

[runtime_registry.course_backup_codex]
cli = "codex-cli"
model = "gpt-5.5"
provider = "openai"
env_profile = "codex_primary"
fallback_to = "course_backup_glm_5_2"
