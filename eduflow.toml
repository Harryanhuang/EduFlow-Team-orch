# ── [team.residency]  v1 驻留策略（2026-07-01 方案 §设计二）───────
# 老板实际使用时希望"角色常驻 + 功能型按需在岗"，这里定义哪些 agent
# 必须永远在线、哪些 agent 没事时释放 CLI（保留 tmux pane），idle
# 超时后由 auto_ops/runtime_guard 周期检查收回。
# 字段缺省时用 residency.DEFAULT_*（manager/auto_ops/Luke_recorder 默
# 认常驻，其它默认温备，warm 通用 600s/300s/60s）。
# 启用范围：本块已经在 v1 落地，cold 默认不启用（plan 非目标）。
[team.residency]
default_mode = "warm"          # 缺省 resident | warm | cold
resident_agents = ["manager", "Sophon", "Luke_recorder"]  # T-146: auto_ops → Sophon
warm_idle_timeout_s  = 900     # 温备 agent 空闲超过该秒数 → sleep CLI (P4-B 调高到 900s 给真任务充裕 buffer)
handoff_buffer_s     = 600     # HANDOFF/CLOSEOUT 后保留 CLI 至少 600s (P4-B 调长,review → manager 慢链路不误关)
wake_timeout_s       = 90      # 唤醒一次 CLI 最多等 90s 再发 ALERT (P4-B 给 CLI 多 30s 启动时间)
# sleep_visible_to_user = false   # 预留: Phase 3 再决定 sleep 是否进群通报

# ── per-agent 覆盖（plan §设计二 建议）──────────────────────
# worker_syllabus: 任务量小,idle 阈值 300s（plan 建议值）,
# handoff buffer 保持 300s 不变。
[team.agents.worker_syllabus.residency]
mode = "warm"
idle_timeout_s = 300

# ── T-119/T-120 复活: worker_school 温备配置 ─────────────────
# 复活后进 warm-standby: pane 活着, identity 加载, 接受 manager 测试消息,
# 不接 manager 派单。T-120 新规: 默认 enabled_for_dispatch=false,
# manager 显式 'eduflow agent unlock worker_school' 临时解锁。
[team.agents.worker_school]
runtime = "school_backup_mimo"
role  = "学校信息专员，负责维护国际学校/民办学校/私立学校档案、招生政策、校区分布、合作状态与对接窗口，并与 worker_teacher 协同老师维度信息。"
specialty = ["学校档案", "招生政策", "校区分布", "合作状态", "学校-老师协同"]
tone = "细致、台账导向、可追溯"
notes = "你只接 manager 的正式派单。职责范围：学校档案维护、招生政策追踪、校区分布梳理、合作状态登记、与 worker_teacher 协同老师维度学校信息。T-120 起进温备（warm-standby）状态 — pane 活着、能回 manager 测试消息, 但默认不接 manager 派单。manager 用 'eduflow agent unlock worker_school' 临时解锁后才接活。v2 协议 (2026-07-01): worker_school 是 worker, 限发 ACK/START/PROGRESS/HANDOFF/BLOCKED, 不能发 CLOSEOUT/REVIEW/ALERT/RECORDED。"
card_color = "blue"
lazy = false
# T-120 温备开关 — true = 接 manager 派单, false = 温备(只回测试消息)
enabled_for_dispatch = false
# ── [chat.publish]  群里能看到什么消息 ─────────────────────
# sender→receiver 维度过滤; 角色: user (老板) / manager / worker
# 值: true=进群发卡  false=只走 send/inbox 不进群  "always"=不可关
# 默认全 true / "always" — 测试 / 早期阶段尽量多看到事实, 减少静默漏消息
# 的认知盲区。生产化后再针对噪声大的通道 (worker_to_manager 等) 调 false。
[chat.publish]
user_to_manager   = "always"
manager_to_user   = "always"
manager_to_worker = true
worker_to_manager = true
worker_to_user    = false  # 2026-07-06 T-117 flip→true 收齐后回 false; T-116 修 BUG 中, 短期别动
worker_to_worker  = false

# ── [limits]  消息长度上限 ────────────────────────────────
[limits]
max_card_body_chars         = 4000
auto_split_long_messages    = true
tmux_capture_default_lines  = 10
tmux_capture_max_lines      = 2000
inbox_unread_warn_threshold = 50

# ── [wake]  Pane 唤醒时序 ──────────────────────────────────
[wake]
lazy_wake_timeout_s    = 30
ready_marker_timeout_s = 60

# ── [router]  路由器守护进程 ───────────────────────────────
[router]
# stale_event_threshold_s — 多久没事件就 self-SIGTERM 让 watchdog 重生.
# 注释掉则用平台默认 (Darwin 120 / Linux 600). 显式设了就用你的值.
# 为什么 macOS 默认更紧: lark-cli 1.0.23 macOS WebSocket subscribe 会
# silent-drop 不重连; 紧阈值让 self-restart + catchup 在 ~2 min 内补回
# 漏的事件而不是 ~10 min. Linux WebSocket 稳定, 600s 避免空闲群被反复
# 重启 (180s 太紧, 1200s 太松, 都踩过坑).
stale_event_threshold_s     = 1200   # 2026-07-10: revert 86400 → 1200; 86400 让 macOS WebSocket 静默断连后 24h 不恢复，丢 boss 消息
lark_call_timeout_s            = 90     # 单次 lark-cli 调用超时
alarm_card_color               = "red"  # 守护进入 cooldown 时报警卡片颜色
seen_max_lines                 = 5000   # router.seen 去重表 trim 阈值
subscribe_watchdog_period_s    = 20.0   # 内部订阅子进程健康检查周期

# ── [watchdog]  daemon 守护循环 ────────────────────────────
[watchdog]
check_interval_s        = 30    # 守护 tick 周期 (查 router 是否还活)
cred_check_interval_s   = 300   # 多久查一次 Claude OAuth 是否快过期
cred_refresh_ahead_s    = 1800  # 剩余 < 此值时强制 refresh OAuth
runtime_guard_interval_s = 30   # 多久巡检一次 agent pane runtime 健康并尝试 fallback

# ── [auto_ops] 主群运行态简报 ──────────────────────────────
# Phase 5 (2026-07-01) 主群体验收敛: 从"定时刷存在感"改成"阶段驱动陪跑"。
# 老板反馈主群噪音大, 定时简报里大量"盯盘中,暂无新异常"无价值。
# 现在默认关闭定时简报, auto_ops 只在阶段变化/异常时才发主群 (ALERT / 阶段卡),
# 无变化时状态进 /team 面板, 不刷主群。
[auto_ops]
presence_enabled = false        # Phase 5: 关闭定时简报, 改阶段驱动 (原 true)
presence_interval_s = 1800      # 保留供回退; presence_enabled=false 时不生效
stage_driven = true             # Phase 5: 只在阶段变化/异常时外显主群
presence_fallback_after_s = 7200  # 兜底: 超过 2h 完全静默才补一条"在岗"信号, 避免老板担心失联

# ── [runtime_guard]  runtime 切换通知与熔断 ────────────────────
[runtime_guard.notify]
default = "manager"            # silent | manager
manager = "silent"

[runtime_guard.manager_policy]
default = "continue"           # continue | pause
manager = "pause"
worker_course = "pause"
worker_review = "pause"
worker_qbank = "pause"
Sophon = "pause"   # T-146: auto_ops → Sophon

[runtime_guard.cooldown]
max_switches = 3
window_s = 600
cooldown_s = 900

[runtime_guard.failback]
min_fallback_s = 300
min_healthy_streak = 3
probe_interval_s = 30
rate_limit_reasons = ["rate_limit", "429", "token_plan_exhausted"]
rate_limit_min_healthy_streak = 5
rate_limit_min_fallback_s = 900
rate_limit_require_real_smoke = true

# ── [feishu]  飞书桥接 ─────────────────────────────────────
[feishu]
send_as          = "bot"
no_proxy         = true
cli_bin          = ""
broadcast_tokens = ["@team", "@all", "@everyone"]
