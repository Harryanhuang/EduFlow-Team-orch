# ── [env_profiles]  provider 环境画像 ───────────────────────────
# 这里只放"会影响 provider / gateway 选择"的环境变量。
# 真正的敏感值（ANTHROPIC_AUTH_TOKEN 等）走 .env 或 shell export 注入；
# 多 provider 场景下，使用 ${VAR} 语法引用 .env 中独立命名的 key，例如
#   ANTHROPIC_AUTH_TOKEN = "${KIMI_AUTH_TOKEN}"
# config 层会展开 ${VAR}；若引用未设置且该敏感 key 仍为空，则继续回退到
# 全局 ANTHROPIC_AUTH_TOKEN / ANTHROPIC_API_KEY，保持旧配置兼容。
# ⚠️  历史明文 token 已轮换 — 旧值 sk-sp-3e0d1bbb… / sk-hhemrEo… /
#     sk-ed25ba30… 视为泄露，不要再回写。
