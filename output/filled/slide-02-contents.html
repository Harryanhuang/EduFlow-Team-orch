<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Contents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .accent-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 14px;
      height: 1080px;
      background-color: #D2A148;
    }
    .map-band {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 330px;
      background: linear-gradient(90deg, #E6F5FA 0%, #FFFFFF 62%, #F2FAFD 100%);
      border-bottom: 1px solid rgba(45,156,196,0.18);
    }
    .title-block {
      position: absolute;
      left: 140px;
      top: 102px;
      width: 360px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.22;
      color: #20283A;
    }
    .intro-block {
      position: absolute;
      left: 140px;
      top: 206px;
      width: 1640px;
    }
    .intro-block [data-slot="intro"] {
      font-weight: 400;
      font-size: 34px;
      line-height: 1.4;
      color: #20283A;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #17495C; /* black @ 60% on white */
    }
    .chapter-card {
      position: absolute;
      height: 130px;
      background-color: #F2FAFD;
      border: 1px solid rgba(45,156,196,0.18);
      border-radius: 6px;
      padding: 28px 34px 20px 112px;
      overflow: hidden;
    }
    .chapter-card.c1 { left: 140px; top: 358px; width: 790px; background-color: #E6F5FA; }
    .chapter-card.c2 { left: 990px; top: 358px; width: 790px; }
    .chapter-card.c3 { left: 140px; top: 518px; width: 790px; }
    .chapter-card.c4 { left: 990px; top: 518px; width: 790px; background-color: #E6F5FA; }
    .chapter-card.c5 { left: 140px; top: 678px; width: 1640px; height: 132px; }
    .chapter-card p {
      font-weight: 600;
      font-size: 31px;
      line-height: 1.34;
      color: #20283A;
    }
    .chapter-card .num {
      position: absolute;
      left: 32px;
      top: 30px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: #2D9CC4;
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 700;
      line-height: 48px;
      text-align: center;
      display: block;
    }
    .chapter-card .rule {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 0;
      height: 5px;
      background-color: #2D9CC4;
      display: block;
    }
    .note {
      position: absolute;
      left: 140px;
      right: 140px;
      bottom: 86px;
      height: 78px;
      background-color: #FFFFFF;
      border-left: 6px solid #D2A148;
      border-top: 1px solid rgba(45,156,196,0.18);
      border-right: 1px solid rgba(45,156,196,0.18);
      border-bottom: 1px solid rgba(45,156,196,0.18);
      border-radius: 6px;
      padding: 19px 28px;
      color: #17495C;
      font-size: 26px;
      line-height: 1.42;
    }
    .map-tag {
      position: absolute;
      right: 140px;
      top: 112px;
      width: 280px;
      height: 58px;
      border-radius: 6px;
      background-color: #2D9CC4;
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 700;
      line-height: 58px;
      text-align: center;
    }
  </style>
<style id="qoderwork-sea-blue-base">
    .slide {
      color: #20283A !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="title"] {
      color: #123A4A !important;
      font-weight: 700 !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="subtitle"] {
      color: #17495C !important;
      font-weight: 500 !important;
    }
    .content-card,
    .comparison-col,
    .timeline-step {
      border: 1px solid rgba(45,156,196,0.18) !important;
      box-shadow: none !important;
    }
    .content-card,
    .col-right {
      background-color: #F2FAFD !important;
    }
    .col-left {
      background-color: #E6F5FA !important;
    }
    .card-image {
      background-color: #FFFFFF !important;
      border: 1px solid rgba(210,161,72,0.35) !important;
    }
    .card-image img {
      color: #2D9CC4 !important;
    }
    [data-slot$="Heading"],
    [data-slot$="Label"] {
      color: #123A4A !important;
      font-weight: 700 !important;
    }
    [data-slot$="Copy"],
    [data-slot$="Item1"],
    [data-slot$="Item2"],
    [data-slot$="Item3"],
    [data-slot$="Item4"] {
      color: #20283A !important;
    }
    .col-items [data-slot$="Item1"]::before,
    .col-items [data-slot$="Item2"]::before,
    .col-items [data-slot$="Item3"]::before,
    .col-items [data-slot$="Item4"]::before {
      background-color: #D2A148 !important;
    }
  </style>
<style id="eduflow-sea-theme">
  .slide { color: #20283A !important; }
  .title-block [data-slot="title"] { color: #123A4A !important; font-weight: 750 !important; letter-spacing: 0 !important; }
  .title-block [data-slot="subtitle"] { color: #17495C !important; font-weight: 500 !important; }
  .content-card, .comparison-col, .timeline-step { border: 1px solid rgba(45,156,196,0.18) !important; box-shadow: none !important; }
  .card-image { background-color: #FFFFFF !important; border: 1px solid rgba(210,161,72,0.35) !important; }
  .card-image img { color: #2D9CC4 !important; }
  [data-slot$="Heading"], [data-slot$="Label"] { color: #123A4A !important; font-weight: 750 !important; }
  [data-slot$="Copy"], [data-slot$="Item1"], [data-slot$="Item2"], [data-slot$="Item3"], [data-slot$="Item4"] { color: #20283A !important; }
</style>
</head>
<body>
  <div class="slide" data-template="contents">
    <div class="map-band"></div>
    <div class="accent-bar"></div>
    <div class="title-block">
      <h1 data-slot="title">目录</h1>
    </div>
    <div class="intro-block">
      <p data-slot="intro">从体系认知进入运行规则，再到学生画像、选课升学和教学动作。</p>
    </div>
    <div class="map-tag">5 个模块 / 46 页</div>
    <div class="chapter-card c1">
      <span class="num">01</span>
      <p data-slot="chapter1">A-Level 体系全貌：阶段、资格、学科菜单、国际评价逻辑</p>
      <span class="rule"></span>
    </div>
    <div class="chapter-card c2">
      <span class="num">02</span>
      <p data-slot="chapter2">CAIE 运行规则：考试季、zone、entry option、paper、合分</p>
      <span class="rule"></span>
    </div>
    <div class="chapter-card c3">
      <span class="num">03</span>
      <p data-slot="chapter3">IG 桥梁与学生画像：诊断、分层、学科功能、语言支架</p>
      <span class="rule"></span>
    </div>
    <div class="chapter-card c4">
      <span class="num">04</span>
      <p data-slot="chapter4">选课与升学路径：英港新澳美、牛娃/普娃路径</p>
      <span class="rule"></span>
    </div>
    <div class="chapter-card c5">
      <span class="num">05</span>
      <p data-slot="chapter5">教学运行与行动清单：背景提升、资料库、专题排期</p>
      <span class="rule"></span>
    </div>
    <div class="note">先建立共同语言，再把考试、选课、升学和课堂动作串成可执行路径。</div>
  </div>


</body></html>
