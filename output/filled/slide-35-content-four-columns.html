<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Content-Four-Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #20283A;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #20283A;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #17495C; /* black @ 60% on white */
    }
    .content-grid {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .content-row {
      display: flex;
      flex-direction: row;
      gap: 32px;
      height: 340px;
    }
    .content-card {
      flex: 1;
      background-color: #F2FAFD;
      border-radius: 16px;
      padding: 56px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }
    .card-image {
      width: 80px;
      height: 80px;
      border-radius: 7px;
      overflow: hidden;
      background-color: #FFFFFF;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-image img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }
    .card-text {
      display: flex;
      flex-direction: column;
      gap: 27px;
      flex: 1;
    }
    .content-card [data-slot$="Heading"] {
      font-weight: 500;
      font-size: 40px;
      line-height: 1.22;
      color: #20283A;
    }
    .content-card [data-slot$="Copy"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.22;
      color: #20283A;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #20283A; /* black @ 70% on white */
    }
  </style>
<style id="qoderwork-sea-blue-base">
    .slide {
      color: #20283A !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="title"] {
      color: #123A4A !important;
      font-weight: 700 !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="subtitle"] {
      color: #17495C !important;
      font-weight: 500 !important;
    }
    .content-card,
    .comparison-col,
    .timeline-step {
      border: 1px solid rgba(45,156,196,0.18) !important;
      box-shadow: none !important;
    }
    .content-card,
    .col-right {
      background-color: #F2FAFD !important;
    }
    .col-left {
      background-color: #E6F5FA !important;
    }
    .card-image {
      background-color: #FFFFFF !important;
      border: 1px solid rgba(210,161,72,0.35) !important;
    }
    .card-image img {
      color: #2D9CC4 !important;
    }
    [data-slot$="Heading"],
    [data-slot$="Label"] {
      color: #123A4A !important;
      font-weight: 700 !important;
    }
    [data-slot$="Copy"],
    [data-slot$="Item1"],
    [data-slot$="Item2"],
    [data-slot$="Item3"],
    [data-slot$="Item4"] {
      color: #20283A !important;
    }
    .col-items [data-slot$="Item1"]::before,
    .col-items [data-slot$="Item2"]::before,
    .col-items [data-slot$="Item3"]::before,
    .col-items [data-slot$="Item4"]::before {
      background-color: #D2A148 !important;
    }
  </style>
<style id="eduflow-sea-theme">
  .slide { color: #20283A !important; }
  .title-block [data-slot="title"] { color: #123A4A !important; font-weight: 750 !important; letter-spacing: 0 !important; }
  .title-block [data-slot="subtitle"] { color: #17495C !important; font-weight: 500 !important; }
  .content-card, .comparison-col, .timeline-step { border: 1px solid rgba(45,156,196,0.18) !important; box-shadow: none !important; }
  .card-image { background-color: #FFFFFF !important; border: 1px solid rgba(210,161,72,0.35) !important; }
  .card-image img { color: #2D9CC4 !important; }
  [data-slot$="Heading"], [data-slot$="Label"] { color: #123A4A !important; font-weight: 750 !important; }
  [data-slot$="Copy"], [data-slot$="Item1"], [data-slot$="Item2"], [data-slot$="Item3"], [data-slot$="Item4"] { color: #20283A !important; }
</style>

<style id="compact-four">
  .title-block { top: 78px !important; gap: 10px !important; }
  .title-block [data-slot="title"] { font-size: 52px !important; line-height: 1.14 !important; }
  .title-block [data-slot="subtitle"] { font-size: 28px !important; line-height: 1.28 !important; }
  .content-grid { top: 250px !important; gap: 20px !important; }
  .content-row { height: 360px !important; gap: 20px !important; }
  .content-card { padding: 28px 34px !important; gap: 14px !important; }
  .card-image { width: 54px !important; height: 54px !important; }
  .card-image img { width: 30px !important; height: 30px !important; }
  .card-text { gap: 10px !important; }
  .content-card [data-slot$="Heading"] { font-size: 29px !important; line-height: 1.14 !important; }
  .content-card [data-slot$="Copy"] { font-size: 20.5px !important; line-height: 1.25 !important; }
</style>
</head>
