<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Content-Three-Columns</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .slide {
      width: 1920px;
      height: 1080px;
      background-color: #FFFFFF;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .title-block {
      position: absolute;
      left: 80px;
      top: 100px;
      width: 1680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .title-block [data-slot="title"] {
      font-weight: 600;
      font-size: 64px;
      line-height: 1.25;
      color: #20283A;
    }
    .title-block [data-slot="subtitle"] {
      font-weight: 400;
      font-size: 40px;
      line-height: 1.4;
      color: #20283A;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #17495C; /* black @ 60% on white */
    }
    .content-row {
      position: absolute;
      left: 80px;
      top: 304px;
      width: 1760px;
      height: 676px;
      display: flex;
      flex-direction: row;
      gap: 32px;
      align-items: stretch;
    }
    .content-card {
      flex: 1;
      background-color: #F2FAFD;
      border-radius: 16px;
      padding: 56px;
      display: flex;
      flex-direction: column;
      gap: 84px;
    }
    .card-image {
      width: 140px;
      height: 140px;
      border-radius: 12px;
      overflow: hidden;
      background-color: #FFFFFF;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-image img {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }
    .card-text {
      display: flex;
      flex-direction: column;
      gap: 27px;
      flex: 1;
    }
    .content-card [data-slot$="Heading"] {
      font-weight: 500;
      font-size: 40px;
      line-height: 1.22;
      color: #20283A;
    }
    .content-card [data-slot$="Copy"] {
      font-weight: 400;
      font-size: 28px;
      line-height: 1.22;
      color: #20283A;
      /* 等效灰色（避免 opacity 导出丢失） */
      color: #20283A; /* black @ 70% on white */
    }
  </style>
<style id="qoderwork-sea-blue-base">
    .slide {
      color: #20283A !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="title"] {
      color: #123A4A !important;
      font-weight: 700 !important;
      letter-spacing: 0 !important;
    }
    .title-block [data-slot="subtitle"] {
      color: #17495C !important;
      font-weight: 500 !important;
    }
    .content-card,
    .comparison-col,
    .timeline-step {
      border: 1px solid rgba(45,156,196,0.18) !important;
      box-shadow: none !important;
    }
    .content-card,
    .col-right {
      background-color: #F2FAFD !important;
    }
    .col-left {
      background-color: #E6F5FA !important;
    }
    .card-image {
      background-color: #FFFFFF !important;
      border: 1px solid rgba(210,161,72,0.35) !important;
    }
    .card-image img {
      color: #2D9CC4 !important;
    }
    [data-slot$="Heading"],
    [data-slot$="Label"] {
      color: #123A4A !important;
      font-weight: 700 !important;
    }
    [data-slot$="Copy"],
    [data-slot$="Item1"],
    [data-slot$="Item2"],
    [data-slot$="Item3"],
    [data-slot$="Item4"] {
      color: #20283A !important;
    }
    .col-items [data-slot$="Item1"]::before,
    .col-items [data-slot$="Item2"]::before,
    .col-items [data-slot$="Item3"]::before,
    .col-items [data-slot$="Item4"]::before {
      background-color: #D2A148 !important;
    }
  </style>
<style id="eduflow-sea-theme">
  .slide { color: #20283A !important; }
  .title-block [data-slot="title"] { color: #123A4A !important; font-weight: 750 !important; letter-spacing: 0 !important; }
  .title-block [data-slot="subtitle"] { color: #17495C !important; font-weight: 500 !important; }
  .content-card, .comparison-col, .timeline-step { border: 1px solid rgba(45,156,196,0.18) !important; box-shadow: none !important; }
  .card-image { background-color: #FFFFFF !important; border: 1px solid rgba(210,161,72,0.35) !important; }
  .card-image img { color: #2D9CC4 !important; }
  [data-slot$="Heading"], [data-slot$="Label"] { color: #123A4A !important; font-weight: 750 !important; }
  [data-slot$="Copy"], [data-slot$="Item1"], [data-slot$="Item2"], [data-slot$="Item3"], [data-slot$="Item4"] { color: #20283A !important; }
</style>

<style id="compact-three">
  .title-block { top: 86px !important; gap: 12px !important; }
  .title-block [data-slot="title"] { font-size: 56px !important; line-height: 1.16 !important; }
  .title-block [data-slot="subtitle"] { font-size: 30px !important; line-height: 1.32 !important; }
  .content-row { top: 284px !important; height: 710px !important; }
  .content-card { padding: 38px !important; gap: 30px !important; }
  .card-image { width: 88px !important; height: 88px !important; border-radius: 8px !important; }
  .card-image img { width: 48px !important; height: 48px !important; }
  .card-text { gap: 16px !important; }
  .content-card [data-slot$="Heading"] { font-size: 31px !important; line-height: 1.18 !important; }
  .content-card [data-slot$="Copy"] { font-size: 22px !important; line-height: 1.30 !important; }
</style>
</head>
